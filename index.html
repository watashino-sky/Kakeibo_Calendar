<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#2c3040; --bg2:#353a4d; --bg3:#3d4357; --card:#454b60;
  --border:#505669; --text:#d8dce8; --dim:#8892a8; --bright:#f0f2f8;
  --accent:#e2d9c4; --accent2:#c8b896; --aglow:rgba(226,217,196,0.14);
  --red:#e07878; --green:#7abfa0; --tagbg:#404760;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;min-height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}
.screen{display:none;flex-direction:column;flex:1;overflow-y:auto;padding-bottom:64px}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0}
.topbar-title{font-family:"DM Serif Display",serif;font-size:22px;color:var(--bright)}
.topbar-sub{font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:18px;color:var(--accent)}
.nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.08em;color:var(--dim);cursor:pointer;text-transform:uppercase}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-item.active{color:var(--accent)}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
.cal-month{font-family:"DM Serif Display",serif;font-size:26px;color:var(--bright)}
.cal-year{font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);margin-top:2px}
.cal-arrow{background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--dim);width:34px;height:34px;font-size:20px;cursor:pointer}
.toggle{display:flex;margin:0 18px 12px;background:var(--bg3);border-radius:10px;padding:3px;gap:3px}
.toggle-btn{flex:1;padding:8px;text-align:center;border-radius:8px;font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.toggle-btn.active{background:var(--aglow);color:var(--accent);border:1px solid var(--accent2)}
.summary{margin:0 18px 12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:14px}
.summary-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.summary-amount{font-family:"DM Serif Display",serif;font-size:36px;color:var(--bright)}
.summary-amount span{font-family:"DM Mono",monospace;font-size:14px;color:var(--dim);margin-left:4px}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;margin-bottom:4px}
.wd{text-align:center;font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px;gap:3px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;gap:1px}
.cal-cell.empty{cursor:default}
.cal-cell.has-data{background:var(--bg3)}
.cal-cell.today{border:1.5px solid var(--accent2)}
.cal-day{font-family:"DM Mono",monospace;font-size:13px;color:var(--text)}
.cal-cell.sun .cal-day{color:var(--red)}
.cal-cell.sat .cal-day{color:#7ab8d4}
.cal-amt{font-family:"DM Mono",monospace;font-size:9px;color:var(--accent2);line-height:1}
.dot{width:5px;height:5px;border-radius:50%}
.dot.red{background:var(--red)}
.dot.green{background:var(--green)}
.day-header{padding:14px 18px 0}
.day-date{font-family:"DM Serif Display",serif;font-size:24px;color:var(--bright)}
.day-total{font-family:"DM Mono",monospace;font-size:18px;color:var(--accent);margin-top:4px}
.sec-label{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:14px 18px 6px}
.trip-card{margin:0 14px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.trip-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)}
.trip-shop{font-size:14px;color:var(--bright);font-weight:500}
.trip-total{font-family:"DM Mono",monospace;font-size:15px;color:var(--accent)}
.trip-items{padding:6px 12px 10px}
.trip-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.trip-item:last-child{border:none}
.trip-price{font-family:"DM Mono",monospace;font-size:13px;color:var(--text)}
.tag-chip{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--tagbg);color:var(--dim);font-family:"DM Mono",monospace;border:1px solid var(--border)}
.sub-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(122,191,160,.15);color:var(--green);font-family:"DM Mono",monospace;border:1px solid rgba(122,191,160,.3)}
.coupon-alert{margin:6px 12px;padding:7px 10px;background:rgba(224,120,120,.08);border:1px solid rgba(224,120,120,.2);border-radius:7px;font-size:11px;color:var(--red)}
.add-btn{margin:0 14px 14px;padding:13px;background:transparent;border:1px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--dim);font-size:13px}
.coupon-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.coupon-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.coupon-card.used{opacity:.4}
.coupon-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.coupon-shop{font-size:15px;color:var(--bright);font-weight:500}
.coupon-exp{font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);margin-bottom:5px}
.coupon-exp.urgent{color:var(--red)}
.coupon-exp.soon{color:#e0c878}
.coupon-memo{font-size:12px;color:var(--text);margin-bottom:8px;line-height:1.5}
.coupon-actions{display:flex;gap:8px}
.coupon-btn{flex:1;padding:8px;text-align:center;border-radius:8px;font-family:"DM Mono",monospace;font-size:10px;border:1px solid var(--border);color:var(--dim);cursor:pointer;text-transform:uppercase}
.coupon-btn.use{color:var(--green);border-color:rgba(122,191,160,.3)}
.badge{font-size:9px;padding:2px 7px;border-radius:4px;font-family:"DM Mono",monospace}
.badge.unlimited{background:rgba(122,191,160,.12);color:var(--green);border:1px solid rgba(122,191,160,.25)}
.badge.used-badge{background:rgba(128,128,128,.15);color:var(--dim);border:1px solid var(--border)}
.coupon-group-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:12px 14px 4px}
.settings-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:16px}
.settings-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px}
.settings-title{font-family:"DM Serif Display",serif;font-size:16px;color:var(--bright);margin-bottom:4px}
.settings-sub{font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);letter-spacing:.08em;margin-bottom:10px}
.manage-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.manage-item{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.manage-name{flex:1;font-size:13px;color:var(--text)}
.manage-sub{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);margin-top:2px}
.manage-actions{display:flex;gap:6px}
.manage-btn{font-family:"DM Mono",monospace;font-size:9px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);color:var(--dim);cursor:pointer;text-transform:uppercase}
.manage-btn.del{color:var(--red);border-color:rgba(224,120,120,.3)}
.add-row{display:flex;gap:8px;align-items:center}
.add-row-btn{font-family:"DM Mono",monospace;font-size:10px;padding:9px 14px;border-radius:8px;background:var(--aglow);border:1px solid var(--accent2);color:var(--accent);cursor:pointer;white-space:nowrap}
.panel{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;justify-content:flex-end;background:rgba(0,0,0,.5)}
.panel.open .panel-inner{transform:translateY(0)}
.panel-inner{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:0 0 env(safe-area-inset-bottom);max-height:92dvh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;flex-shrink:0}
.panel-title{font-family:"DM Serif Display",serif;font-size:18px;color:var(--bright)}
.panel-close{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:50%;color:var(--dim);cursor:pointer;font-size:16px}
.panel-body{overflow-y:auto;padding:0 18px 18px;display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--bright);font-size:15px;font-family:"Noto Sans JP",sans-serif;outline:none;width:100%}
.form-input::placeholder{color:var(--dim)}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-btn{font-size:11px;padding:5px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);cursor:pointer;font-family:"DM Mono",monospace}
.tag-btn.on{background:var(--aglow);border-color:var(--accent2);color:var(--accent)}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.item-row{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;gap:8px}
.item-row-info{flex:1;font-family:"DM Mono",monospace;font-size:12px;color:var(--text)}
.item-row-del{color:var(--red);font-size:16px;cursor:pointer;padding:0 4px}
.subtotal{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)}
.subtotal-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.subtotal-val{font-family:"DM Serif Display",serif;font-size:22px;color:var(--accent)}
.btn-primary{padding:14px;text-align:center;background:var(--accent2);color:var(--bg);border-radius:12px;cursor:pointer;font-weight:500;font-size:14px}
.btn-secondary{padding:12px;text-align:center;color:var(--dim);border-radius:12px;cursor:pointer;font-size:13px}
.btn-danger{padding:12px;text-align:center;color:var(--red);border-radius:12px;cursor:pointer;font-size:13px;border:1px solid rgba(224,120,120,.2)}
.cycle-btns{display:flex;gap:8px}
.cycle-btn{flex:1;padding:10px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);text-transform:uppercase}
.cycle-btn.on{background:var(--aglow);border-color:var(--accent2);color:var(--accent)}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:16px}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);letter-spacing:.1em}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-family:"DM Mono",monospace;font-size:11px;color:var(--bright);z-index:300;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.empty-state{text-align:center;padding:50px 20px;color:var(--dim);font-size:13px;line-height:2}
</style>
</head>
<body>
<div id="app">

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">LOADING...</div>
</div>

<!-- CALENDAR -->
<div class="screen active" id="s-calendar">
  <div class="topbar">
    <div><div class="topbar-title">家計簿</div></div>
    <div class="icon-btn" onclick="openShopFormToday()">＋</div>
  </div>
  <div class="cal-nav-row">
    <button class="cal-arrow" onclick="moveMonth(-1)">‹</button>
    <div><div class="cal-month" id="cal-month"></div><div class="cal-year" id="cal-year"></div></div>
    <button class="cal-arrow" onclick="moveMonth(1)">›</button>
  </div>
  <div class="toggle">
    <div class="toggle-btn active" id="tog-amount" onclick="setMode('amount')">Total</div>
    <div class="toggle-btn" id="tog-coupon" onclick="setMode('coupon')">Coupon</div>
  </div>
  <div id="cal-summary" class="summary"></div>
  <div class="wdays"><div class="wd">日</div><div class="wd">月</div><div class="wd">火</div><div class="wd">水</div><div class="wd">木</div><div class="wd">金</div><div class="wd">土</div></div>
  <div id="cal-grid" class="cal-grid"></div>
</div>

<!-- DAY -->
<div class="screen" id="s-day">
  <div class="topbar">
    <button onclick="goScreen('calendar')" style="background:transparent;border:none;color:var(--dim);font-size:22px;cursor:pointer">‹</button>
    <div class="topbar-title" id="day-title"></div>
    <div style="width:34px"></div>
  </div>
  <div id="day-body"></div>
</div>

<!-- COUPON -->
<div class="screen" id="s-coupon">
  <div class="topbar">
    <div><div class="topbar-title">クーポン</div><div class="topbar-sub">Coupon</div></div>
    <div class="icon-btn" onclick="openPanel('coupon-panel')">＋</div>
  </div>
  <div id="coupon-body"></div>
</div>

<!-- SETTINGS -->
<div class="screen" id="s-settings">
  <div class="topbar"><div><div class="topbar-title">設定</div><div class="topbar-sub">Settings</div></div></div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-title">タグ管理</div>
      <div id="tag-list" class="manage-list"></div>
      <div class="add-row">
        <input class="form-input" id="new-tag" placeholder="新しいタグ名" style="flex:1">
        <div class="add-row-btn" onclick="addTag()">追加</div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">サブスク管理</div>
      <div class="settings-sub">請求日にカレンダーへ自動表示されます</div>
      <div id="sub-list" class="manage-list"></div>
      <div class="add-row" style="justify-content:flex-end">
        <div class="add-row-btn" onclick="openSubForm()">＋ 追加</div>
      </div>
    </div>
  </div>
</div>

<nav class="nav">
  <div class="nav-item active" id="nav-calendar" onclick="goScreen('calendar')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Calendar
  </div>
  <div class="nav-item" id="nav-coupon" onclick="goScreen('coupon')">
    <svg viewBox="0 0 24 24"><path d="M20 12V6a2 2 0 00-2-2H6a2 2 0 00-2 2v6m16 0v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6m16 0H4"/><circle cx="12" cy="12" r="2"/></svg>Coupon
  </div>
  <div class="nav-item" id="nav-settings" onclick="goScreen('settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings
  </div>
</nav>
</div>

<!-- SHOP PANEL -->
<div class="panel" id="shop-panel">
  <div class="panel-inner">
    <div class="panel-head">
      <div class="panel-title" id="shop-panel-title">買い物を追加</div>
      <div class="panel-close" onclick="closePanel('shop-panel')">×</div>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label class="form-label">店名</label>
        <input class="form-input" id="shop-input" placeholder="例：イオン、コンビニ…" autocomplete="off">
        <div id="shop-coupon-alert" style="display:none;margin-top:8px" class="coupon-alert">🎫 このお店のクーポンがあります！</div>
      </div>
      <div class="form-group">
        <label class="form-label">商品</label>
        <div id="shop-item-list" class="item-list"></div>
        <input id="price-input" type="number" inputmode="numeric" placeholder="金額（円）" class="form-input" style="margin-bottom:8px">
        <div id="shop-tag-grid" class="tag-grid" style="margin-bottom:8px"></div>
        <div class="btn-secondary" style="border:1px solid var(--border);border-radius:10px" onclick="addItem()">＋ 商品を追加</div>
      </div>
      <div class="subtotal">
        <div><div class="subtotal-label">小計</div><div class="subtotal-val" id="subtotal">0<span style="font-size:12px;color:var(--dim)"> 円</span></div></div>
        <div style="font-family:DM Mono,monospace;font-size:11px;color:var(--dim)" id="item-count">0点</div>
      </div>
      <div class="btn-primary" onclick="saveTrip()">登録する</div>
      <div class="btn-secondary" onclick="closePanel('shop-panel')">キャンセル</div>
    </div>
  </div>
</div>

<!-- COUPON PANEL -->
<div class="panel" id="coupon-panel">
  <div class="panel-inner">
    <div class="panel-head">
      <div class="panel-title">クーポンを追加</div>
      <div class="panel-close" onclick="closePanel('coupon-panel')">×</div>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label class="form-label">店名</label>
        <input class="form-input" id="coupon-shop" placeholder="例：イオン" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">有効期限 <span style="color:var(--dim);font-size:9px">— 空欄で無制限</span></label>
        <input class="form-input" id="coupon-exp" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">メモ</label>
        <input class="form-input" id="coupon-memo" placeholder="例：500円引き、3000円以上">
      </div>
      <div class="btn-primary" onclick="saveCoupon()">登録する</div>
      <div class="btn-secondary" onclick="closePanel('coupon-panel')">キャンセル</div>
    </div>
  </div>
</div>

<!-- SUB PANEL -->
<div class="panel" id="sub-panel">
  <div class="panel-inner">
    <div class="panel-head">
      <div class="panel-title" id="sub-panel-title">サブスクを追加</div>
      <div class="panel-close" onclick="closePanel('sub-panel')">×</div>
    </div>
    <div class="panel-body">
      <div class="form-group">
        <label class="form-label">サービス名</label>
        <input class="form-input" id="sub-name" placeholder="例：Netflix、Spotify">
      </div>
      <div class="form-group">
        <label class="form-label">金額（円）</label>
        <input class="form-input" id="sub-amount" type="number" inputmode="numeric" placeholder="例：990">
      </div>
      <div class="form-group">
        <label class="form-label">請求サイクル</label>
        <div class="cycle-btns">
          <div class="cycle-btn on" id="cycle-m" onclick="setCycle('monthly')">月次</div>
          <div class="cycle-btn" id="cycle-y" onclick="setCycle('yearly')">年次</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">次回請求日</label>
        <input class="form-input" id="sub-next" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">タグ</label>
        <div id="sub-tag-grid" class="tag-grid"></div>
      </div>
      <div class="btn-primary" onclick="saveSub()">登録する</div>
      <div class="btn-secondary" onclick="closePanel('sub-panel')">キャンセル</div>
      <div class="btn-danger" id="sub-del-btn" onclick="deleteSub()">このサブスクを削除</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzdJY__eIbZ5GSvzkuGXsMHu8XiRk-RHZUlaD4qPrHng55Bwx8m94bBvrzL4O-CsEhx/exec';

// ── utils ──
function fmt(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function normalizeDate(s) {
  if(!s) return '';
  const str = String(s);
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  if(str.includes('T')) {
    const d = new Date(str);
    const jst = new Date(d.getTime()+9*60*60*1000);
    return fmt(jst);
  }
  return str;
}
function parseItems(items) {
  if(Array.isArray(items)) return items;
  if(typeof items==='string') { try { return JSON.parse(items); } catch(e) { return []; } }
  return [];
}
function fmtJP(s) {
  const d = new Date(s+'T00:00:00');
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function daysUntil(s) {
  const clean = normalizeDate(s);
  if(!clean) return null;
  return Math.ceil((new Date(clean+'T00:00:00')-new Date(todayStr+'T00:00:00'))/86400000);
}
let _toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className='toast '+type;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── state ──
const today = new Date();
const todayStr = fmt(today);
let records=[], coupons=[], tags=['食費','日用品','交通費','娯楽','医療','その他'], subs=[];
let curMonth = new Date(today.getFullYear(), today.getMonth(), 1);
let calMode = 'amount';
let curDate = todayStr;
let curItems=[], selTags=[], nextId=Date.now();
let subEditIdx=null, subCycle='monthly', subSelTags=[];

// ── GAS ──
async function gasGet(p) {
  const r = await fetch(GAS+'?'+new URLSearchParams(p), {redirect:'follow'});
  return r.json();
}
async function gasPost(b) {
  try {
    const r = await fetch(GAS, {method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(b)});
    return r.json();
  } catch(e) { return {error:e.message}; }
}

// ── navigation ──
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  const nav = document.getElementById('nav-'+name);
  if(nav) nav.classList.add('active');
  if(name==='calendar') renderCalendar();
  if(name==='coupon') renderCoupons();
  if(name==='settings') renderSettings();
}
function openPanel(id) {
  const p = document.getElementById(id);
  p.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('open')));
}
function closePanel(id) {
  const p = document.getElementById(id);
  p.classList.remove('open');
  setTimeout(()=>{ p.style.display='none'; }, 300);
}

// ── calendar ──
function setMode(m) {
  calMode=m;
  document.getElementById('tog-amount').classList.toggle('active', m==='amount');
  document.getElementById('tog-coupon').classList.toggle('active', m==='coupon');
  renderCalendar();
}
function moveMonth(d) {
  curMonth = new Date(curMonth.getFullYear(), curMonth.getMonth()+d, 1);
  renderCalendar();
}
function getSubDates(sub, y, m) {
  const ms = y+'-'+String(m+1).padStart(2,'0');
  const results=[];
  const nd = normalizeDate(sub.nextDate);
  if(!nd) return results;
  const base = new Date(nd+'T00:00:00');
  const step = d=>{ sub.cycle==='monthly'?d.setMonth(d.getMonth()+1):d.setFullYear(d.getFullYear()+1); };
  const stepBack = d=>{ sub.cycle==='monthly'?d.setMonth(d.getMonth()-1):d.setFullYear(d.getFullYear()-1); };
  let d = new Date(base);
  for(let i=0;i<24;i++) { if(fmt(d).startsWith(ms)) results.push(fmt(d)); step(d); }
  d = new Date(base); stepBack(d);
  for(let i=0;i<24;i++) { if(fmt(d).startsWith(ms)) results.push(fmt(d)); stepBack(d); }
  return results;
}
function renderCalendar() {
  const y=curMonth.getFullYear(), m=curMonth.getMonth();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month').textContent=months[m];
  document.getElementById('cal-year').textContent=y;
  const ms=y+'-'+String(m+1).padStart(2,'0');

  const dayTotals={};
  records.filter(r=>r.date.startsWith(ms)).forEach(r=>{
    const d=r.date.split('-')[2];
    if(!d||d.length!==2) return;
    const items=parseItems(r.items);
    dayTotals[d]=(dayTotals[d]||0)+items.reduce((s,i)=>s+Number(i.price||0),0);
  });

  const couponDays={};
  coupons.filter(c=>!c.used&&c.exp&&c.exp.startsWith(ms)).forEach(c=>{
    const d=c.exp.split('-')[2];
    if(d) couponDays[d]=true;
  });

  const monthTotal=Object.values(dayTotals).reduce((s,v)=>s+v,0)
    +subs.reduce((s,sub)=>s+getSubDates(sub,y,m).length*Number(sub.amount),0);
  document.getElementById('cal-summary').innerHTML=
    '<div class="summary-label">Monthly Total</div><div class="summary-amount">'+monthTotal.toLocaleString()+'<span>円</span></div>';

  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='cal-cell empty';grid.appendChild(c);}
  for(let d=1;d<=days;d++){
    const ds=String(d).padStart(2,'0');
    const dateStr=ms+'-'+ds;
    const dow=new Date(y,m,d).getDay();
    const subAmt=subs.reduce((s,sub)=>getSubDates(sub,y,m).includes(dateStr)?s+Number(sub.amount):s,0);
    const total=(dayTotals[ds]||0)+subAmt;
    const hasCoupon=!!couponDays[ds];
    const isToday=dateStr===todayStr;
    const cell=document.createElement('div');
    cell.className='cal-cell'+(isToday?' today':'')+((total>0||hasCoupon)?' has-data':'')+(dow===0?' sun':dow===6?' sat':'');
    cell.onclick=()=>openDay(dateStr);
    let html='<div class="cal-day">'+d+'</div>';
    if(calMode==='amount'&&total>0) html+='<div class="cal-amt">'+total.toLocaleString()+'</div>';
    if(calMode==='coupon'){
      if(hasCoupon) html+='<div class="dot red"></div>';
      if(subAmt>0) html+='<div class="dot green"></div>';
    }
    cell.innerHTML=html;
    grid.appendChild(cell);
  }
}

// ── day ──
function openDay(dateStr) {
  curDate=dateStr;
  document.getElementById('day-title').textContent=fmtJP(dateStr);
  renderDay();
  goScreen('day');
}
function renderDay() {
  const recs=records.filter(r=>r.date===curDate);
  const [y,m]=curDate.split('-').map(Number);
  const daySubs=subs.filter(sub=>getSubDates(sub,y,m-1).includes(curDate));
  const total=recs.reduce((s,r)=>s+parseItems(r.items).reduce((ss,i)=>ss+Number(i.price||0),0),0)
    +daySubs.reduce((s,sub)=>s+Number(sub.amount),0);
  let html='<div class="day-header"><div class="day-date">'+fmtJP(curDate)+'</div><div class="day-total">'+total.toLocaleString()+' 円</div></div>';
  if(daySubs.length>0){
    html+='<div class="sec-label">サブスク請求</div>';
    daySubs.forEach(sub=>{
      html+='<div class="trip-card"><div class="trip-head"><div class="trip-shop">'+sub.name+' <span class="sub-badge">'+(sub.cycle==='monthly'?'月次':'年次')+'</span></div><div class="trip-total">'+Number(sub.amount).toLocaleString()+'円</div></div>';
      if(sub.tags&&sub.tags.length) html+='<div class="trip-items"><div class="trip-item">'+sub.tags.map(t=>'<span class="tag-chip">'+t+'</span>').join('')+'</div></div>';
      html+='</div>';
    });
  }
  if(recs.length>0){
    html+='<div class="sec-label">買い物</div>';
    recs.forEach(r=>{
      const items=parseItems(r.items);
      const rt=items.reduce((s,i)=>s+Number(i.price||0),0);
      const hc=coupons.some(c=>!c.used&&c.shop===r.shop);
      html+='<div class="trip-card"><div class="trip-head"><div class="trip-shop">'+r.shop+'</div><div class="trip-total">'+rt.toLocaleString()+'円</div></div>';
      if(hc) html+='<div class="coupon-alert">🎫 '+r.shop+'のクーポンがあります</div>';
      html+='<div class="trip-items">'+items.map(item=>'<div class="trip-item"><div class="trip-price">'+Number(item.price||0).toLocaleString()+'円</div>'+item.tags.map(t=>'<span class="tag-chip">'+t+'</span>').join('')+'</div>').join('')+'</div></div>';
    });
  }
  if(recs.length===0&&daySubs.length===0) html+='<div class="empty-state">🛒<br>まだ記録がありません</div>';
  html+='<div class="add-btn" onclick="openShopForm()"><span style="font-size:18px;color:var(--accent)">＋</span> 買い物を追加</div>';
  document.getElementById('day-body').innerHTML=html;
}

// ── shop form ──
function openShopFormToday() {
  curDate=todayStr;
  openShopForm();
}
function openShopForm() {
  curItems=[]; selTags=[];
  document.getElementById('shop-input').value='';
  document.getElementById('price-input').value='';
  document.getElementById('shop-coupon-alert').style.display='none';
  document.getElementById('shop-panel-title').textContent=fmtJP(curDate)+' の買い物';
  renderShopTags(); updateItemList();
  openPanel('shop-panel');
  document.getElementById('shop-input').oninput=function(){
    const has=this.value&&coupons.some(c=>!c.used&&c.shop.includes(this.value));
    document.getElementById('shop-coupon-alert').style.display=has?'block':'none';
  };
}
function renderShopTags(){
  document.getElementById('shop-tag-grid').innerHTML=tags.map(t=>
    '<div class="tag-btn'+(selTags.includes(t)?' on':'')+'" onclick="toggleTag(\''+t+'\')">'+t+'</div>'
  ).join('');
}
function toggleTag(t){ selTags.includes(t)?selTags.splice(selTags.indexOf(t),1):selTags.push(t); renderShopTags(); }
function addItem(){
  const price=parseInt(document.getElementById('price-input').value);
  if(!price||price<=0){toast('金額を入力してください','err');return;}
  curItems.push({price,tags:[...selTags]});
  selTags=[]; document.getElementById('price-input').value='';
  renderShopTags(); updateItemList();
}
function removeItem(i){ curItems.splice(i,1); updateItemList(); }
function updateItemList(){
  const total=curItems.reduce((s,i)=>s+i.price,0);
  document.getElementById('shop-item-list').innerHTML=curItems.map((item,i)=>
    '<div class="item-row"><div class="item-row-info">'+item.price.toLocaleString()+'円　'+item.tags.map(t=>'<span class="tag-chip">'+t+'</span>').join('')+'</div><div class="item-row-del" onclick="removeItem('+i+')">×</div></div>'
  ).join('');
  document.getElementById('subtotal').innerHTML=total.toLocaleString()+'<span style="font-size:12px;color:var(--dim)"> 円</span>';
  document.getElementById('item-count').textContent=curItems.length+'点';
}
async function saveTrip(){
  const shop=document.getElementById('shop-input').value.trim();
  if(!shop){toast('店名を入力してください','err');return;}
  if(curItems.length===0){toast('商品を追加してください','err');return;}
  const record={id:nextId++,date:curDate,shop,items:[...curItems]};
  records.push(record);
  closePanel('shop-panel');
  renderDay(); renderCalendar();
  toast('✓ 登録しました');
  try{
    const res=await gasPost({action:'addRecord',date:curDate,shop,items:curItems});
    record.id=res.id||record.id;
  }catch(e){toast('保存に失敗しました','err');}
}

// ── coupon ──
function renderCoupons(){
  const active=coupons.filter(c=>!c.used);
  const used=coupons.filter(c=>c.used);
  let html='';
  const renderGroup=(list,label)=>{
    if(!list.length) return;
    html+='<div class="coupon-group-label">'+label+'</div><div class="coupon-list">';
    list.forEach(c=>{
      const unl=!c.exp;
      const days=unl?null:daysUntil(c.exp);
      const expCls=unl?'':days!==null&&days<=3&&!c.used?'urgent':days!==null&&days<=7&&!c.used?'soon':'';
      const expLabel=c.used?'使用済み':unl?'無制限':days<0?'期限切れ':days===0?'今日まで':'残'+days+'日';
      const expDisplay=unl?'—':normalizeDate(c.exp).replace(/-/g,'/');
      html+='<div class="coupon-card'+(c.used?' used':'')+'"><div class="coupon-top"><div class="coupon-shop">'+c.shop+'</div>'+(unl?'<div class="badge unlimited">∞ 無制限</div>':c.used?'<div class="badge used-badge">Used</div>':'')+'</div>';
      html+='<div class="coupon-exp '+expCls+'">'+expDisplay+'　<span style="font-size:10px;opacity:.8">('+expLabel+')</span></div>';
      if(c.memo) html+='<div class="coupon-memo">'+c.memo+'</div>';
      if(!c.used) html+='<div class="coupon-actions"><div class="coupon-btn use" onclick="useCoupon('+c.id+')">使用済みにする</div><div class="coupon-btn" onclick="delCoupon('+c.id+')">削除</div></div>';
      html+='</div>';
    });
    html+='</div>';
  };
  renderGroup(active,'有効');
  renderGroup(used,'使用済み');
  if(!coupons.length) html='<div class="empty-state">🎫<br>クーポンがありません</div>';
  html+='<div class="add-btn" onclick="openPanel(\'coupon-panel\')"><span style="font-size:18px;color:var(--accent)">＋</span> クーポンを追加</div>';
  document.getElementById('coupon-body').innerHTML=html;
}
async function saveCoupon(){
  const shop=document.getElementById('coupon-shop').value.trim();
  if(!shop){toast('店名を入力してください','err');return;}
  const coupon={id:nextId++,shop,exp:document.getElementById('coupon-exp').value,memo:document.getElementById('coupon-memo').value.trim(),used:false};
  coupons.push(coupon);
  closePanel('coupon-panel');
  renderCoupons();
  try{
    const res=await gasPost({action:'addCoupon',...coupon});
    coupon.id=res.id||coupon.id;
    toast('✓ クーポンを登録しました');
  }catch(e){toast('保存に失敗しました','err');}
}
async function useCoupon(id){
  const c=coupons.find(c=>c.id===id);
  if(c){c.used=true;renderCoupons();try{await gasPost({action:'updateCoupon',...c});}catch(e){}}
}
async function delCoupon(id){
  coupons=coupons.filter(c=>c.id!==id);
  renderCoupons();
  try{await gasPost({action:'deleteCoupon',id});}catch(e){}
}

// ── subscriptions ──
function setCycle(c){
  subCycle=c;
  document.getElementById('cycle-m').classList.toggle('on',c==='monthly');
  document.getElementById('cycle-y').classList.toggle('on',c==='yearly');
}
function renderSubTags(){
  document.getElementById('sub-tag-grid').innerHTML=tags.map(t=>
    '<div class="tag-btn'+(subSelTags.includes(t)?' on':'')+'" onclick="toggleSubTag(\''+t+'\')">'+t+'</div>'
  ).join('');
}
function toggleSubTag(t){ subSelTags.includes(t)?subSelTags.splice(subSelTags.indexOf(t),1):subSelTags.push(t); renderSubTags(); }
function openSubForm(idx=null){
  subEditIdx=idx; subCycle='monthly'; subSelTags=[];
  if(idx!==null){
    const s=subs[idx];
    document.getElementById('sub-panel-title').textContent='サブスクを編集';
    document.getElementById('sub-name').value=s.name;
    document.getElementById('sub-amount').value=s.amount;
    document.getElementById('sub-next').value=normalizeDate(s.nextDate);
    subCycle=s.cycle; subSelTags=[...(s.tags||[])];
    document.getElementById('sub-del-btn').style.display='block';
  }else{
    document.getElementById('sub-panel-title').textContent='サブスクを追加';
    ['sub-name','sub-amount','sub-next'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('sub-del-btn').style.display='none';
  }
  setCycle(subCycle); renderSubTags(); openPanel('sub-panel');
}
async function saveSub(){
  const name=document.getElementById('sub-name').value.trim();
  const amount=parseInt(document.getElementById('sub-amount').value);
  const nextDate=document.getElementById('sub-next').value;
  if(!name){toast('サービス名を入力してください','err');return;}
  if(!amount||amount<=0){toast('金額を入力してください','err');return;}
  if(!nextDate){toast('次回請求日を入力してください','err');return;}
  const sub={name,amount,cycle:subCycle,nextDate,tags:[...subSelTags]};
  if(subEditIdx!==null){
    sub.id=subs[subEditIdx].id;
    subs[subEditIdx]=sub;
    try{await gasPost({action:'updateSub',...sub});toast('✓ 更新しました');}catch(e){toast('保存に失敗しました','err');}
  }else{
    sub.id=nextId++;
    subs.push(sub);
    try{const res=await gasPost({action:'addSub',...sub});sub.id=res.id||sub.id;toast('✓ 登録しました');}catch(e){toast('保存に失敗しました','err');}
  }
  closePanel('sub-panel'); renderSettings(); renderCalendar();
}
async function deleteSub(){
  if(subEditIdx===null) return;
  const id=subs[subEditIdx].id;
  subs.splice(subEditIdx,1);
  closePanel('sub-panel'); renderSettings(); renderCalendar();
  try{await gasPost({action:'deleteSub',id});}catch(e){}
}

// ── settings ──
function renderSettings(){
  document.getElementById('tag-list').innerHTML=tags.map((t,i)=>
    '<div class="manage-item"><div class="manage-name">'+t+'</div><div class="manage-actions"><div class="manage-btn" onclick="renameTag('+i+')">編集</div><div class="manage-btn del" onclick="removeTag('+i+')">削除</div></div></div>'
  ).join('')||'<div style="color:var(--dim);font-size:12px">まだありません</div>';
  document.getElementById('sub-list').innerHTML=subs.map((s,i)=>
    '<div class="manage-item"><div style="flex:1"><div class="manage-name">'+s.name+'</div><div class="manage-sub">'+Number(s.amount).toLocaleString()+'円 / '+(s.cycle==='monthly'?'月次':'年次')+' — 次回 '+normalizeDate(s.nextDate).replace(/-/g,'/')+'</div></div><div class="manage-actions"><div class="manage-btn" onclick="openSubForm('+i+')">編集</div></div></div>'
  ).join('')||'<div style="color:var(--dim);font-size:12px">まだありません</div>';
}
function addTag(){
  const v=document.getElementById('new-tag').value.trim();
  if(!v||tags.includes(v)){toast('タグ名を確認してください','err');return;}
  tags.push(v); document.getElementById('new-tag').value='';
  renderSettings();
  try{gasPost({action:'saveTags',tags});}catch(e){}
}
function removeTag(i){ tags.splice(i,1); renderSettings(); try{gasPost({action:'saveTags',tags});}catch(e){} }
function renameTag(i){
  const v=prompt('新しいタグ名',tags[i]);
  if(!v||!v.trim()) return;
  records.forEach(r=>{parseItems(r.items).forEach(item=>{const idx=item.tags.indexOf(tags[i]);if(idx!==-1)item.tags[idx]=v.trim();});});
  tags[i]=v.trim(); renderSettings();
  try{gasPost({action:'saveTags',tags});}catch(e){}
}

// ── init ──
goScreen('calendar');
async function loadData(){
  try{
    const data=await Promise.race([
      gasGet({action:'getAll'}),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),15000))
    ]);
    if(data.records) records=data.records.map(r=>({...r,date:normalizeDate(r.date),items:parseItems(r.items)}));
    if(data.coupons) coupons=data.coupons.map(c=>({...c,exp:normalizeDate(c.exp)}));
    if(data.tags&&data.tags.length) tags=data.tags;
    if(data.subs) subs=data.subs.map(s=>({...s,nextDate:normalizeDate(s.nextDate)}));
    renderCalendar(); renderCoupons(); renderSettings();
  }catch(e){
    toast('読み込みエラー: '+e.message,'err');
    renderCalendar();
  }finally{
    document.getElementById('loading').style.display='none';
  }
}
loadData();
</script>
</body>
