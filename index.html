<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家計簿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2c3040;
    --bg2: #353a4d;
    --bg3: #3d4357;
    --card: #454b60;
    --border: #505669;
    --text: #d8dce8;
    --text-dim: #8892a8;
    --text-bright: #f0f2f8;
    --accent: #e2d9c4;
    --accent2: #c8b896;
    --accent-glow: rgba(226,217,196,0.14);
    --red: #e07878;
    --green: #7abfa0;
    --tag-bg: #404760;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-weight: 300; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  .screen { display: none !important; flex: 1; overflow-y: auto; padding-bottom: 80px; flex-direction: column; }
  .screen.active { display: flex !important; }

  /* ── Top bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: 0.02em; }
  .topbar-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .topbar-right { display: flex; gap: 8px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); font-size: 15px; transition: all 0.15s; }
  .icon-btn:active { background: var(--card); color: var(--accent); }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 64px; background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex; z-index: 20;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; color: var(--text-dim); transition: color 0.15s;
    font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-item.active { color: var(--accent); }
  .nav-item.active svg path, .nav-item.active svg rect, .nav-item.active svg circle { stroke: var(--accent); }

  /* ── Calendar ── */
  .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; }
  .cal-month { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text-bright); }
  .cal-year { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .cal-nav { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); font-size: 16px; }
  .cal-nav:active { background: var(--bg3); }

  .cal-toggle { display: flex; margin: 8px 20px; background: var(--bg3); border-radius: 8px; padding: 3px; border: 1px solid var(--border); }
  .cal-toggle-btn { flex: 1; padding: 6px 0; text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: var(--text-dim); border-radius: 6px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .cal-toggle-btn.active { background: var(--card); color: var(--accent); }

  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px 12px 0; }
  .cal-wd { text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); padding: 4px 0; letter-spacing: 0.04em; }
  .cal-wd:first-child { color: var(--red); opacity: 0.7; }
  .cal-wd:last-child { color: #7a9abf; opacity: 0.7; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 4px 12px 16px; gap: 3px; }
  .cal-cell {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer; transition: background 0.12s; padding: 2px;
    border: 1px solid transparent;
  }
  .cal-cell:active { background: var(--bg3); }
  .cal-cell.today { border-color: var(--accent2); background: var(--accent-glow); }
  .cal-cell.has-data { background: var(--bg3); }
  .cal-cell.has-data:active { background: var(--card); }
  .cal-cell.empty { cursor: default; }
  .cal-day { font-size: 12px; color: var(--text); font-weight: 400; line-height: 1; }
  .cal-cell.today .cal-day { color: var(--accent); font-weight: 500; }
  .cal-cell:first-child .cal-day, .cal-cell.sun .cal-day { color: var(--red); opacity: 0.8; }
  .cal-cell.sat .cal-day { color: #7a9abf; opacity: 0.8; }
  .cal-amount { font-family: 'DM Mono', monospace; font-size: 7px; color: var(--accent2); margin-top: 2px; line-height: 1; }
  .cal-coupon-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--red); margin-top: 2px; opacity: 0.8; }

  /* Monthly summary */
  .month-summary { margin: 0 20px 16px; padding: 16px; background: var(--bg3); border-radius: 12px; border: 1px solid var(--border); }
  .month-summary-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .month-summary-amount { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text-bright); }
  .month-summary-amount span { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text-dim); margin-left: 4px; }

  /* ── Shopping / Day view ── */
  .day-header { padding: 16px 20px 0; }
  .day-date { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text-bright); }
  .day-total-row { display: flex; align-items: baseline; gap: 8px; margin-top: 4px; }
  .day-total-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .day-total { font-family: 'DM Mono', monospace; font-size: 20px; color: var(--accent); }

  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 20px 8px; }

  /* Trip cards */
  .trip-card { margin: 0 16px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .trip-card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .trip-shop { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .trip-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); }
  .trip-total { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--accent); }
  .trip-items { padding: 8px 14px 12px; }
  .trip-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .trip-item:last-child { border-bottom: none; }
  .trip-item-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .trip-item-price { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
  .tag-chip { font-size: 9px; padding: 2px 7px; border-radius: 4px; background: var(--tag-bg); color: var(--text-dim); font-family: 'DM Mono', monospace; letter-spacing: 0.04em; border: 1px solid var(--border); }
  .coupon-notice { margin: 8px 14px; padding: 8px 10px; background: rgba(224,112,112,0.08); border: 1px solid rgba(224,112,112,0.2); border-radius: 8px; font-size: 11px; color: var(--red); display: flex; align-items: center; gap: 6px; }

  /* Add trip form */
  .add-trip-btn { margin: 0 16px 16px; padding: 14px; background: transparent; border: 1px dashed var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--text-dim); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
  .add-trip-btn:active { background: var(--bg3); border-color: var(--accent2); color: var(--accent); }

  /* ── Input form (modal-like) ── */
  .form-panel {
    position: fixed; bottom: 0; left: 0; right: 0; top: 0;
    background: var(--bg); z-index: 30; display: none; flex-direction: column;
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .form-panel.open { display: flex; transform: translateY(0); }
  .form-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .form-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); }
  .form-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); font-size: 20px; }
  .form-body { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
  .form-group { margin-bottom: 20px; }
  .form-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; display: block; }
  .form-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; color: var(--text-bright); font-family: 'Noto Sans JP', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent2); }
  .form-input::placeholder { color: var(--text-dim); font-size: 13px; }
  .datalist-suggest { background: var(--bg3); }

  .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-select-btn {
    padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--tag-bg); color: var(--text-dim); font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s;
  }
  .tag-select-btn.selected { background: var(--accent-glow); border-color: var(--accent2); color: var(--accent); }

  /* Items list in form */
  .item-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .item-row { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .item-row-price { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text-bright); flex: 1; }
  .item-row-tags { display: flex; gap: 4px; flex-wrap: wrap; flex: 2; }
  .item-row-del { color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 4px; }

  .add-item-row { display: flex; gap: 8px; align-items: flex-end; }
  .add-item-row .form-input { flex: 1; }

  .subtotal-bar { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .subtotal-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .subtotal-amount { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); }
  .subtotal-yen { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim); }

  .btn-primary {
    width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none;
    border-radius: 10px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
    cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary {
    width: 100%; padding: 14px; background: transparent; color: var(--text-dim); border: 1px solid var(--border);
    border-radius: 10px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; margin-top: 10px; transition: all 0.15s;
  }
  .btn-secondary:active { background: var(--bg3); color: var(--text); }

  /* ── Coupon screen ── */
  .coupon-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
  .coupon-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; transition: opacity 0.15s; }
  .coupon-card.used { opacity: 0.45; }
  .coupon-shop-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .coupon-shop { font-size: 14px; color: var(--text-bright); font-weight: 500; }
  .coupon-used-badge { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 8px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .coupon-exp-row { display: flex; align-items: center; gap: 8px; }
  .coupon-exp-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .coupon-exp { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); }
  .coupon-exp.urgent { color: var(--red); }
  .coupon-exp.soon { color: #e0b870; }
  .coupon-memo { font-size: 12px; color: var(--text-dim); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .coupon-actions { display: flex; gap: 8px; margin-top: 10px; }
  .coupon-action-btn { flex: 1; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); cursor: pointer; text-align: center; letter-spacing: 0.04em; transition: all 0.15s; text-transform: uppercase; }
  .coupon-action-btn:active { background: var(--bg3); color: var(--accent); border-color: var(--accent2); }
  .coupon-action-btn.use { color: var(--green); border-color: rgba(122,184,154,0.3); }

  .section-shop-header { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 20px 8px; border-top: 1px solid var(--border); margin-top: 8px; }
  .section-shop-header:first-of-type { border-top: none; margin-top: 0; }

  .add-coupon-btn { margin: 16px; padding: 14px; background: transparent; border: 1px dashed var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--text-dim); font-size: 13px; transition: all 0.15s; }
  .add-coupon-btn:active { background: var(--bg3); border-color: var(--accent2); color: var(--accent); }

  /* ── Settings ── */
  .settings-section { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .settings-section-title { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .settings-section-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
  .manage-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; margin-top: 12px; }
  .manage-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .manage-item-name { font-size: 14px; color: var(--text-bright); }
  .manage-item-actions { display: flex; gap: 6px; }
  .manage-item-btn { font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.15s; }
  .manage-item-btn:active { background: var(--bg3); color: var(--text); }
  .manage-item-btn.del { color: var(--red); border-color: rgba(224,120,120,0.3); }
  .manage-item-btn.del:active { background: rgba(224,120,120,0.1); }
  .manage-add-row { display: flex; gap: 8px; align-items: center; }
  .manage-add-btn { padding: 12px 16px; background: var(--accent-glow); border: 1px solid var(--accent2); border-radius: 8px; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; cursor: pointer; white-space: nowrap; transition: all 0.15s; text-transform: uppercase; }
  .manage-add-btn:active { background: var(--card); }

  /* ── Subscription ── */
  .sub-cycle-btn { flex:1; padding:10px; text-align:center; background:var(--bg3); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim); letter-spacing:0.06em; transition:all 0.15s; }
  .sub-cycle-btn.active { background:var(--accent-glow); border-color:var(--accent2); color:var(--accent); }
  .sub-badge { font-family:'DM Mono',monospace; font-size:8px; padding:2px 6px; border-radius:3px; background:rgba(122,191,160,0.15); border:1px solid rgba(122,191,160,0.3); color:var(--green); letter-spacing:0.04em; }
  .cal-sub-dot { width:4px; height:4px; border-radius:50%; background:var(--green); margin-top:2px; opacity:0.9; }

  /* ── Misc ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; line-height: 1.8; }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

  /* Date pill */
  .date-pill { display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; margin: 12px 20px 0; }
</style>
</head>
<body>
<div id="app">

  <!-- ===== CALENDAR SCREEN ===== -->
  <div class="screen" id="screen-calendar" style="display:none">
    <div class="topbar">
      <div>
        <div class="topbar-title">家計簿</div>
      </div>
      <div class="topbar-right">
        <div class="icon-btn" onclick="openCouponAdd()">＋</div>
      </div>
    </div>

    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div>
        <div class="cal-month" id="cal-month-label"></div>
        <div class="cal-year" id="cal-year-label"></div>
      </div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>

    <div class="cal-toggle">
      <div class="cal-toggle-btn active" id="toggle-amount" onclick="setCalMode('amount')">Total</div>
      <div class="cal-toggle-btn" id="toggle-coupon" onclick="setCalMode('coupon')">Coupon</div>
    </div>

    <div id="month-summary" class="month-summary"></div>

    <div class="cal-weekdays">
      <div class="cal-wd">日</div><div class="cal-wd">月</div><div class="cal-wd">火</div>
      <div class="cal-wd">水</div><div class="cal-wd">木</div><div class="cal-wd">金</div>
      <div class="cal-wd">土</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- ===== DAY SCREEN ===== -->
  <div class="screen" id="screen-day" style="display:none">
    <div class="topbar">
      <button class="cal-nav" onclick="showScreen('calendar')" style="border:none;background:transparent;font-size:20px;color:var(--text-dim);">‹</button>
      <div class="topbar-title" id="day-screen-title">—</div>
      <div style="width:36px"></div>
    </div>
    <div id="day-content"></div>
  </div>

  <!-- ===== COUPON SCREEN ===== -->
  <div class="screen" id="screen-coupon" style="display:none">
    <div class="topbar">
      <div>
        <div class="topbar-title">クーポン</div>
        <div class="topbar-sub">Coupon</div>
      </div>
      <div class="topbar-right">
        <div class="icon-btn" onclick="openCouponAdd()">＋</div>
      </div>
    </div>
    <div id="coupon-list-content"></div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-calendar" onclick="showScreen('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="3" ry="3"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Calendar
    </div>
    <div class="nav-item" id="nav-coupon" onclick="showScreen('coupon')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 12V6a2 2 0 00-2-2H6a2 2 0 00-2 2v6m16 0v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6m16 0H4"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
      Coupon
    </div>
    <div class="nav-item" id="nav-settings" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>

  <!-- ===== SETTINGS SCREEN ===== -->
  <div class="screen" id="screen-settings">

<div class="form-panel" id="coupon-form">
  <div class="form-topbar">
    <div class="form-title">クーポンを追加</div>

  </div>
  <div class="form-body">
    <div class="form-group">
      <label class="form-label">店名</label>
      <input class="form-input" id="coupon-shop" list="shop-suggestions" placeholder="例：イオン" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">有効期限 <span style="color:var(--text-dim);font-size:9px;letter-spacing:0.04em">— 空欄で無制限</span></label>
      <input class="form-input" id="coupon-exp" type="date">
    </div>

    <button class="btn-secondary" onclick="closeCouponForm()">キャンセル</button>

<script>
// ── GAS API ──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzdJY__eIbZ5GSvzkuGXsMHu8XiRk-RHZUlaD4qPrHng55Bwx8m94bBvrzL4O-CsEhx/exec';

async function gasGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url, { redirect: 'follow' });
  return res.json();
}
async function gasPost(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── Utils ──
function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtJP(str) {
  const d = new Date(str+'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

// ── State ──
const today = new Date();
const todayStr = fmt(today);

let records = [];
let coupons = [];
let tags = ['食費','日用品','交通費','娯楽','医療','その他'];
let selectedTags = [];
let currentItems = [];
let currentDate = null;
let currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
let calMode = 'amount';
let nextId = 100;


function daysUntil(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const t = new Date(todayStr+'T00:00:00');
  return Math.ceil((d-t)/(1000*60*60*24));
}

// ── Navigation ──
const SCREENS = ['calendar','day','coupon','settings'];
function showScreen(name) {
  SCREENS.forEach(n => {
    const s = document.getElementById('screen-'+n);
    if(s) { s.style.display = ''; s.classList.remove('active'); }
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const target = document.getElementById('screen-'+name);
  if(target) { target.classList.add('active'); }
  const nav = document.getElementById('nav-'+name);
  if(nav) nav.classList.add('active');
  if(name==='calendar') renderCalendar();
  if(name==='coupon') renderCoupons();
  if(name==='settings') renderSettings();
}

// ── Calendar ──
function setCalMode(mode) {
  calMode = mode;
  document.getElementById('toggle-amount').classList.toggle('active', mode==='amount');
  document.getElementById('toggle-coupon').classList.toggle('active', mode==='coupon');
  renderCalendar();
}

function changeMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+delta, 1);
  renderCalendar();
}

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = months[month];
  document.getElementById('cal-year-label').textContent = year;

  // Monthly total
  const monthStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthRecords = records.filter(r => r.date.startsWith(monthStr));
  const monthTotal = monthRecords.reduce((s,r) => s + r.items.reduce((ss,i) => ss+i.price,0), 0);
  document.getElementById('month-summary').innerHTML = `
    <div class="month-summary-label">Monthly Total</div>
    <div class="month-summary-amount">${monthTotal.toLocaleString()}<span>円</span></div>
  `;

  // Build grid
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day total map
  const dayTotals = {};
  records.filter(r => r.date.startsWith(monthStr)).forEach(r => {
    const d = r.date.split('-')[2];
    dayTotals[d] = (dayTotals[d]||0) + r.items.reduce((s,i) => s+i.price, 0);
  });

  // Coupon expiry map
  const couponDays = {};
  coupons.filter(c => !c.used && c.exp.startsWith(monthStr)).forEach(c => {
    const d = c.exp.split('-')[2];
    if(!couponDays[d]) couponDays[d] = [];
    couponDays[d].push(c);
  });

  for(let i=0;i<firstDay;i++) {
    const cell = document.createElement('div');
    cell.className='cal-cell empty';
    grid.appendChild(cell);
  }
  for(let d=1;d<=daysInMonth;d++) {
    const ds = String(d).padStart(2,'0');
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${ds}`;
    const isToday = dateStr===todayStr;
    const hasData = !!dayTotals[ds];
    const hasCoupon = !!couponDays[ds];
    const dow = new Date(year,month,d).getDay();

    const cell = document.createElement('div');
    cell.className = `cal-cell${isToday?' today':''}${hasData||hasCoupon?' has-data':''}${dow===0?' sun':dow===6?' sat':''}`;
    cell.onclick = () => openDay(dateStr);

    const hasSub = subscriptions.some(sub => getSubsForDate(dateStr).length > 0);
    let inner = `<div class="cal-day">${d}</div>`;
    if(calMode==='amount') {
      const subTotal = getSubsForDate(dateStr).reduce((s,sub)=>s+sub.amount,0);
      const total = (dayTotals[ds]||0) + subTotal;
      if(total > 0) inner += `<div class="cal-amount">${total.toLocaleString()}</div>`;
    } else if(calMode==='coupon') {
      if(hasCoupon) inner += `<div class="cal-coupon-dot"></div>`;
      if(hasSub) inner += `<div class="cal-sub-dot"></div>`;
    }
    cell.innerHTML = inner;
    grid.appendChild(cell);
  }
}

// ── Day view ──
function openDay(dateStr) {
  currentDate = dateStr;
  showScreen('day');
  document.getElementById('day-screen-title').textContent = fmtJP(dateStr);
  renderDay(dateStr);
}

function renderDay(dateStr) {
  const dayRecs = records.filter(r => r.date===dateStr);
  const dayTotal = dayRecs.reduce((s,r) => s+r.items.reduce((ss,i)=>ss+i.price,0), 0);
  let html = `
    <div class="day-header">
      <div class="day-date">${fmtJP(dateStr)}</div>
      <div class="day-total-row">
        <div class="day-total-label">合計</div>
        <div class="day-total">${dayTotal.toLocaleString()} 円</div>
      </div>
    </div>`;

  const daySubs = getSubsForDate(dateStr);
  if(daySubs.length > 0) {
    html += `<div class="section-label">サブスク請求</div>`;
    daySubs.forEach(sub => {
      html += `<div class="trip-card">
        <div class="trip-card-header">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="trip-shop">${sub.name}</div>
            <span class="sub-badge">${sub.cycle==='monthly'?'月次':'年次'}</span>
          </div>
          <div class="trip-total">${sub.amount.toLocaleString()}円</div>
        </div>
        <div class="trip-items">
          <div class="trip-item">
            <div class="trip-item-left">
              ${sub.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
    });
  }
  if(dayRecs.length===0 && daySubs.length===0) {
    html += `<div class="empty-state"><div class="empty-icon">🛒</div>まだ記録がありません<br>買い物を追加してみましょう</div>`;
  } else if(dayRecs.length > 0) {
    html += `<div class="section-label">買い物</div>`;
    dayRecs.forEach(r => {
      const tripTotal = r.items.reduce((s,i)=>s+i.price,0);
      const hasCoupon = coupons.some(c => !c.used && c.shop===r.shop);
      html += `<div class="trip-card">
        <div class="trip-card-header">
          <div class="trip-shop">${r.shop}</div>
          <div class="trip-total">${tripTotal.toLocaleString()}円</div>
        </div>`;
      if(hasCoupon) html += `<div class="coupon-notice">🎫 ${r.shop}のクーポンがあります</div>`;
      html += `<div class="trip-items">`;
      r.items.forEach(item => {
        html += `<div class="trip-item">
          <div class="trip-item-left">
            <div class="trip-item-price">${item.price.toLocaleString()}円</div>
            ${item.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
  }

  html += `<div class="add-trip-btn" onclick="openShopForm('${dateStr}')"><span style="font-size:18px;color:var(--accent)">＋</span> 買い物を追加</div>`;
  document.getElementById('day-content').innerHTML = html;
}

// ── Shop form ──
function openShopForm(dateStr) {
  currentDate = dateStr;
  currentItems = [];
  selectedTags = [];
  document.getElementById('input-shop').value = '';
  document.getElementById('input-price').value = '';
  document.getElementById('coupon-notice').style.display = 'none';
  document.getElementById('shop-form-title').textContent = `${fmtJP(dateStr)} の買い物`;
  updateShopSuggestions();
  renderTagGrid();
  updateItemList();
  updateSubtotal();
  const panel = document.getElementById('shop-form');
  panel.style.display='flex';
  setTimeout(()=>panel.classList.add('open'),10);

  document.getElementById('input-shop').addEventListener('input', function() {
    const shop = this.value;
    const has = coupons.some(c => !c.used && c.shop.includes(shop) && shop.length>0);
    document.getElementById('coupon-notice').style.display = has ? 'flex' : 'none';
  });
}
function closeShopForm() {
  const panel = document.getElementById('shop-form');
  panel.classList.remove('open');
  setTimeout(()=>{ panel.style.display='none'; },300);
}

function updateShopSuggestions() {
  const shops = [...new Set(records.map(r=>r.shop))];
  const dl = document.getElementById('shop-suggestions');
  dl.innerHTML = shops.map(s=>`<option value="${s}">`).join('');
}

function renderTagGrid() {
  const grid = document.getElementById('tag-grid-input');
  grid.innerHTML = tags.map(t => `
    <div class="tag-select-btn${selectedTags.includes(t)?' selected':''}" onclick="toggleTag('${t}')">${t}</div>
  `).join('');
}

function toggleTag(tag) {
  if(selectedTags.includes(tag)) selectedTags = selectedTags.filter(t=>t!==tag);
  else selectedTags.push(tag);
  renderTagGrid();
}

function addItem() {
  const price = parseInt(document.getElementById('input-price').value);
  if(!price || price<=0) { alert('金額を入力してください'); return; }
  currentItems.push({ price, tags:[...selectedTags] });
  document.getElementById('input-price').value = '';
  selectedTags = [];
  renderTagGrid();
  updateItemList();
  updateSubtotal();
}

function removeItem(idx) {
  currentItems.splice(idx,1);
  updateItemList();
  updateSubtotal();
}

function updateItemList() {
  const list = document.getElementById('item-list');
  if(currentItems.length===0) { list.innerHTML=''; return; }
  list.innerHTML = currentItems.map((item,i) => `
    <div class="item-row">
      <div class="item-row-price">${item.price.toLocaleString()}円</div>
      <div class="item-row-tags">${item.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('')}</div>
      <div class="item-row-del" onclick="removeItem(${i})">×</div>
    </div>
  `).join('');
}

function updateSubtotal() {
  const total = currentItems.reduce((s,i)=>s+i.price,0);
  document.getElementById('subtotal-display').textContent = total.toLocaleString();
  document.getElementById('item-count-display').textContent = `${currentItems.length}点`;
}

async function saveTrip() {
  const shop = document.getElementById('input-shop').value.trim();
  if(!shop) { alert('店名を入力してください'); return; }
  if(currentItems.length===0) { alert('商品を1つ以上追加してください'); return; }
  const trip = { date:currentDate, shop, items:[...currentItems] };
  try {
    const res = await gasPost({ action:'addRecord', ...trip });
    trip.id = res.id || nextId++;
    if(!shops.includes(shop)) shops.push(shop);
  } catch(e) { trip.id = nextId++; }
  records.push(trip);
  closeShopForm();
  renderDay(currentDate);
}

// ── Coupons ──
function renderCoupons() {
  // 無制限（exp空）→ 期限近い順 → 使用済み
  const unlimited = coupons.filter(c => !c.used && !c.exp);
  const active = coupons.filter(c => !c.used && c.exp).sort((a,b) => a.exp.localeCompare(b.exp));
  const used = coupons.filter(c => c.used);
  const sorted = [...unlimited, ...active, ...used];

  const shopGroups = {};
  sorted.forEach(c => {
    if(!shopGroups[c.shop]) shopGroups[c.shop] = [];
    shopGroups[c.shop].push(c);
  });

  let html = '';
  let first = true;
  for(const [shop, list] of Object.entries(shopGroups)) {
    html += `<div class="section-shop-header${first?' first':''}">${shop}</div>`;
    first = false;
    html += `<div class="coupon-list">`;
    list.forEach(c => {
      const isUnlimited = !c.exp;
      const days = isUnlimited ? null : daysUntil(c.exp);
      const expClass = isUnlimited ? '' : (days<=3&&!c.used?'urgent':days<=7&&!c.used?'soon':'');
      const expLabel = c.used ? '使用済み'
        : isUnlimited ? '無制限'
        : days < 0 ? '期限切れ'
        : days === 0 ? '今日まで'
        : `残${days}日`;
      const expDisplay = isUnlimited ? '—' : c.exp.replace(/-/g,'/');
      html += `<div class="coupon-card${c.used?' used':''}">
        <div class="coupon-shop-row">
          <div class="coupon-shop">${c.shop}</div>
          ${isUnlimited ? '<div class="coupon-used-badge" style="color:var(--accent2);border-color:var(--accent2)">∞ 無制限</div>' : ''}
          ${c.used ? '<div class="coupon-used-badge">Used</div>' : ''}
        </div>
        <div class="coupon-exp-row">
          <div class="coupon-exp-label">Exp.</div>
          <div class="coupon-exp ${expClass}">${expDisplay} <span style="font-size:10px;opacity:0.8">(${expLabel})</span></div>
        </div>
        ${c.memo ? `<div class="coupon-memo">${c.memo}</div>` : ''}
        ${!c.used ? `<div class="coupon-actions">
          <div class="coupon-action-btn use" onclick="markCouponUsed(${c.id})">使用済みにする</div>
          <div class="coupon-action-btn" onclick="deleteCoupon(${c.id})">削除</div>
        </div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }
  if(coupons.length === 0) html = `<div class="empty-state"><div class="empty-icon">🎫</div>クーポンがありません<br>＋ボタンから追加できます</div>`;
  html += `<div class="add-coupon-btn" onclick="openCouponAdd()"><span style="font-size:18px;color:var(--accent)">＋</span> クーポンを追加</div>`;
  document.getElementById('coupon-list-content').innerHTML = html;
}

async function markCouponUsed(id) {
  const c = coupons.find(c=>c.id===id);
  if(c) {
    c.used = true;
    try { await gasPost({ action:'updateCoupon', ...c }); } catch(e) {}
  }
  renderCoupons();
}
async function deleteCoupon(id) {
  coupons = coupons.filter(c=>c.id!==id);
  try { await gasPost({ action:'deleteCoupon', id }); } catch(e) {}
  renderCoupons();
}

function openCouponAdd() {
  document.getElementById('coupon-shop').value='';
  document.getElementById('coupon-exp').value='';
  document.getElementById('coupon-memo').value='';
  const panel = document.getElementById('coupon-form');
  panel.style.display='flex';
  setTimeout(()=>panel.classList.add('open'),10);
}
function closeCouponForm() {
  const panel = document.getElementById('coupon-form');
  panel.classList.remove('open');
  setTimeout(()=>{ panel.style.display='none'; },300);
}
function saveCoupon() {
  const shop = document.getElementById('coupon-shop').value.trim();
  const exp = document.getElementById('coupon-exp').value;
  const memo = document.getElementById('coupon-memo').value.trim();
  if(!shop) { alert('店名を入力してください'); return; }
  if(!exp) { alert('有効期限を入力してください'); return; }
  coupons.push({ id:nextId++, shop, exp, memo, used:false });
  closeCouponForm();
  renderCoupons();
}

// ── Settings ──
let shops = [];

function renderSettings() {
  // Tags
  const tagList = document.getElementById('tag-manage-list');
  tagList.innerHTML = tags.map((t, i) => `
    <div class="manage-item">
      <div class="manage-item-name">${t}</div>
      <div class="manage-item-actions">
        <button class="manage-item-btn" onclick="renameTag(${i})">編集</button>
        <button class="manage-item-btn del" onclick="deleteTag(${i})">削除</button>
      </div>
    </div>
  `).join('');

  // Subscriptions
  renderSubManageList();

  // Shops
  const shopList = document.getElementById('shop-manage-list');
  // Merge from records
  const allShops = [...new Set([...shops, ...records.map(r=>r.shop)])];
  shops = allShops;
  shopList.innerHTML = allShops.map((s, i) => `
    <div class="manage-item">
      <div class="manage-item-name">${s}</div>
      <div class="manage-item-actions">
        <button class="manage-item-btn" onclick="renameShop(${i})">編集</button>
        <button class="manage-item-btn del" onclick="deleteShop(${i})">削除</button>
      </div>
    </div>
  `).join('');
}

function addTag() {
  const input = document.getElementById('new-tag-input');
  const val = input.value.trim();
  if(!val) return;
  if(tags.includes(val)) { alert('同じ名前のタグが既にあります'); return; }
  tags.push(val);
  input.value = '';
  renderSettings();
  try { gasPost({ action:'saveTags', tags }); } catch(e) {}
}

function deleteTag(i) {
  tags.splice(i, 1);
  renderSettings();
}

function renameTag(i) {
  const newName = prompt('新しいタグ名', tags[i]);
  if(!newName || !newName.trim()) return;
  const trimmed = newName.trim();
  if(tags.includes(trimmed) && trimmed !== tags[i]) { alert('同じ名前のタグが既にあります'); return; }
  // Update in records too
  records.forEach(r => r.items.forEach(item => {
    const idx = item.tags.indexOf(tags[i]);
    if(idx !== -1) item.tags[idx] = trimmed;
  }));
  tags[i] = trimmed;
  renderSettings();
  try { gasPost({ action:'saveTags', tags }); } catch(e) {}
}

function addShop() {
  const input = document.getElementById('new-shop-input');
  const val = input.value.trim();
  if(!val) return;
  if(shops.includes(val)) { alert('同じ名前のお店が既にあります'); return; }
  shops.push(val);
  input.value = '';
  renderSettings();
  updateShopSuggestions();
}

function deleteShop(i) {
  shops.splice(i, 1);
  renderSettings();
  updateShopSuggestions();
}

function renameShop(i) {
  const newName = prompt('新しいお店名', shops[i]);
  if(!newName || !newName.trim()) return;
  const trimmed = newName.trim();
  if(shops.includes(trimmed) && trimmed !== shops[i]) { alert('同じ名前のお店が既にあります'); return; }
  // Update in records too
  records.forEach(r => { if(r.shop === shops[i]) r.shop = trimmed; });
  coupons.forEach(c => { if(c.shop === shops[i]) c.shop = trimmed; });
  shops[i] = trimmed;
  renderSettings();
  updateShopSuggestions();
}


// ── Subscriptions ──
let subscriptions = [];
let subSelectedTags = [];
let subEditId = null;
let subCycle = 'monthly';

function getSubDatesForMonth(sub, year, month) {
  // その月に請求が来る日付を返す
  const monthStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const results = [];
  const base = new Date(sub.nextDate + 'T00:00:00');
  // 過去・現在・未来の請求日を全月分チェック
  // nextDateを基点にサイクルで前後展開
  let d = new Date(base);
  // 未来方向
  while(true) {
    const ds = fmt(d);
    if(ds.startsWith(monthStr)) { results.push(ds); }
    if(d.getFullYear() > year + 1) break;
    if(sub.cycle === 'monthly') d.setMonth(d.getMonth()+1);
    else d.setFullYear(d.getFullYear()+1);
  }
  // 過去方向
  d = new Date(base);
  if(sub.cycle === 'monthly') d.setMonth(d.getMonth()-1);
  else d.setFullYear(d.getFullYear()-1);
  while(true) {
    const ds = fmt(d);
    if(ds.startsWith(monthStr)) { results.push(ds); }
    if(d.getFullYear() < year - 1) break;
    if(sub.cycle === 'monthly') d.setMonth(d.getMonth()-1);
    else d.setFullYear(d.getFullYear()-1);
  }
  return results;
}

function getSubsForDate(dateStr) {
  const [year, month] = dateStr.split('-').map(Number);
  return subscriptions.filter(sub => {
    const dates = getSubDatesForMonth(sub, year, month-1);
    return dates.includes(dateStr);
  });
}

function renderSubManageList() {
  const list = document.getElementById('sub-manage-list');
  if(!list) return;
  if(subscriptions.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:8px 0">まだ登録がありません</div>';
    return;
  }
  list.innerHTML = subscriptions.map((s,i) => `
    <div class="manage-item">
      <div style="flex:1">
        <div class="manage-item-name">${s.name}</div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2px">
          ${s.amount.toLocaleString()}円 / ${s.cycle==='monthly'?'月次':'年次'} — 次回 ${s.nextDate.replace(/-/g,'/')}
        </div>
      </div>
      <div class="manage-item-actions">
        <button class="manage-item-btn" onclick="editSub(${i})">編集</button>
        <button class="manage-item-btn del" onclick="deleteSub(${i})">削除</button>
      </div>
    </div>
  `).join('');
}

function openSubForm(editIdx=null) {
  subEditId = editIdx;
  subCycle = 'monthly';
  subSelectedTags = [];
  if(editIdx !== null) {
    const s = subscriptions[editIdx];
    document.getElementById('sub-form-title').textContent = 'サブスクを編集';
    document.getElementById('sub-name').value = s.name;
    document.getElementById('sub-amount').value = s.amount;
    document.getElementById('sub-next').value = s.nextDate;
    subCycle = s.cycle;
    subSelectedTags = [...s.tags];
  } else {
    document.getElementById('sub-form-title').textContent = 'サブスクを追加';
    document.getElementById('sub-name').value = '';
    document.getElementById('sub-amount').value = '';
    document.getElementById('sub-next').value = '';
  }
  selectCycle(subCycle);
  renderSubTagGrid();
  // 編集時のみ削除ボタン表示
  document.getElementById('sub-delete-btn').style.display = editIdx !== null ? 'block' : 'none';
  const panel = document.getElementById('sub-form');
  panel.style.display = 'flex';
  setTimeout(() => panel.classList.add('open'), 10);
}

async function deleteSubFromForm() {
  if(subEditId === null) return;
  const id = subscriptions[subEditId].id;
  subscriptions.splice(subEditId, 1);
  try { await gasPost({ action:'deleteSub', id }); } catch(e) {}
  closeSubForm();
  renderSubManageList();
}

function closeSubForm() {
  const panel = document.getElementById('sub-form');
  panel.classList.remove('open');
  setTimeout(() => { panel.style.display = 'none'; }, 300);
}

function selectCycle(c) {
  subCycle = c;
  document.getElementById('cycle-monthly').classList.toggle('active', c==='monthly');
  document.getElementById('cycle-yearly').classList.toggle('active', c==='yearly');
}

function renderSubTagGrid() {
  const grid = document.getElementById('sub-tag-grid');
  grid.innerHTML = tags.map(t => `
    <div class="tag-select-btn${subSelectedTags.includes(t)?' selected':''}" onclick="toggleSubTag('${t}')">${t}</div>
  `).join('');
}

function toggleSubTag(tag) {
  if(subSelectedTags.includes(tag)) subSelectedTags = subSelectedTags.filter(t=>t!==tag);
  else subSelectedTags.push(tag);
  renderSubTagGrid();
}

async function saveSub() {
  const name = document.getElementById('sub-name').value.trim();
  const amount = parseInt(document.getElementById('sub-amount').value);
  const nextDate = document.getElementById('sub-next').value;
  if(!name) { alert('サービス名を入力してください'); return; }
  if(!amount || amount <= 0) { alert('金額を入力してください'); return; }
  if(!nextDate) { alert('次回請求日を入力してください'); return; }
  const sub = { name, amount, cycle:subCycle, nextDate, tags:[...subSelectedTags] };
  if(subEditId !== null) {
    sub.id = subscriptions[subEditId].id;
    subscriptions[subEditId] = sub;
    try { await gasPost({ action:'updateSub', ...sub }); } catch(e) {}
  } else {
    try {
      const res = await gasPost({ action:'addSub', ...sub });
      sub.id = res.id || nextId++;
    } catch(e) { sub.id = nextId++; }
    subscriptions.push(sub);
  }
  closeSubForm();
  renderSubManageList();
}

function editSub(i) { openSubForm(i); }

function deleteSub(i) {
  subscriptions.splice(i, 1);
  renderSubManageList();
}

// ── Init ──
async function init() {
  // まずUIを表示してからGASを読み込む
  showScreen('calendar');
  try {
    const data = await Promise.race([
      gasGet({ action: 'getAll' }),
      new Promise((_,reject) => setTimeout(() => reject(new Error('timeout')), 10000))
    ]);
    if(data) {
      records       = data.records   || data['レコード']  || [];
      coupons       = data.coupons   || data['クーポン']  || [];
      const t       = data.tags      || data['タグ']      || [];
      if(t.length) tags = t;
      shops         = data.shops     || data['ショップ']  || [];
      subscriptions = data.subs      || data['購読']      || [];
      renderCalendar();
    }
  } catch(e) {
    console.error('GAS読み込みエラー:', e);
  }
}
init();
</script>
