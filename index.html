<style>
:root {
  --bg:     #2c3040;
  --bg2:    #353a4d;
  --bg3:    #3d4357;
  --card:   #454b60;
  --border: #505669;
  --text:   #d8dce8;
  --dim:    #8892a8;
  --bright: #f0f2f8;
  --accent: #e2d9c4;
  --accent2:#c8b896;
  --aglow:  rgba(226,217,196,0.14);
  --red:    #e07878;
  --green:  #7abfa0;
  --tagbg:  #404760;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;font-weight:300;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}

/* screens */
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding-bottom:72px}
.screen.active{display:flex}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.topbar-title{font-family:"DM Serif Display",serif;font-size:22px;color:var(--accent)}
.topbar-sub{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:16px}

/* bottom nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:20}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--dim);font-size:9px;font-family:"DM Mono",monospace;letter-spacing:.06em;text-transform:uppercase}
.nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-item.active{color:var(--accent)}

/* calendar */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px}
.cal-month{font-family:"DM Serif Display",serif;font-size:26px;color:var(--bright)}
.cal-year{font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);margin-top:2px}
.cal-arrow{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.summary{margin:0 16px 12px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.summary-label{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.summary-amount{font-family:"DM Serif Display",serif;font-size:30px;color:var(--bright)}
.summary-amount span{font-family:"DM Mono",monospace;font-size:13px;color:var(--dim);margin-left:4px}
.toggle{display:flex;margin:0 16px 10px;background:var(--bg3);border-radius:8px;padding:3px;border:1px solid var(--border)}
.toggle-btn{flex:1;padding:6px 0;text-align:center;font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--dim);border-radius:6px;cursor:pointer;text-transform:uppercase}
.toggle-btn.active{background:var(--card);color:var(--accent)}
.wdays{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px}
.wd{text-align:center;font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);padding:4px 0}
.wd:first-child{color:var(--red);opacity:.7}
.wd:last-child{color:#7a9abf;opacity:.7}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 10px 12px;gap:3px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:1px solid transparent;padding:2px}
.cal-cell.today{border-color:var(--accent2);background:var(--aglow)}
.cal-cell.has-data{background:var(--bg3)}
.cal-cell.empty{cursor:default}
.cal-day{font-size:12px;color:var(--text);line-height:1}
.cal-cell.today .cal-day{color:var(--accent);font-weight:500}
.cal-cell.sun .cal-day{color:var(--red);opacity:.8}
.cal-cell.sat .cal-day{color:#7a9abf;opacity:.8}
.cal-amt{font-family:"DM Mono",monospace;font-size:7px;color:var(--accent2);margin-top:2px;line-height:1}
.dot{width:4px;height:4px;border-radius:50%;margin-top:2px}
.dot.red{background:var(--red)}
.dot.green{background:var(--green)}

/* day */
.day-header{padding:14px 18px 0}
.day-date{font-family:"DM Serif Display",serif;font-size:24px;color:var(--bright)}
.day-total{font-family:"DM Mono",monospace;font-size:18px;color:var(--accent);margin-top:4px}
.sec-label{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:14px 18px 6px}
.trip-card{margin:0 14px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.trip-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)}
.trip-shop{font-size:14px;color:var(--bright);font-weight:500}
.trip-total{font-family:"DM Mono",monospace;font-size:15px;color:var(--accent)}
.trip-items{padding:6px 12px 10px}
.trip-item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.trip-item:last-child{border:none}
.trip-price{font-family:"DM Mono",monospace;font-size:13px;color:var(--text)}
.tag-chip{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--tagbg);color:var(--dim);font-family:"DM Mono",monospace;border:1px solid var(--border)}
.sub-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(122,191,160,.15);color:var(--green);font-family:"DM Mono",monospace;border:1px solid rgba(122,191,160,.3)}
.coupon-alert{margin:6px 12px;padding:7px 10px;background:rgba(224,120,120,.08);border:1px solid rgba(224,120,120,.2);border-radius:7px;font-size:11px;color:var(--red)}
.add-btn{margin:0 14px 14px;padding:13px;background:transparent;border:1px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--dim);font-size:13px}
.empty-state{text-align:center;padding:50px 20px;color:var(--dim);font-size:13px;line-height:2}

/* coupon */
.coupon-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.coupon-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px}
.coupon-card.used{opacity:.4}
.coupon-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.coupon-shop{font-size:14px;color:var(--bright);font-weight:500}
.badge{font-family:"DM Mono",monospace;font-size:9px;padding:2px 8px;border-radius:4px;background:var(--bg);border:1px solid var(--border);color:var(--dim);text-transform:uppercase}
.badge.unlimited{color:var(--accent2);border-color:var(--accent2)}
.badge.used-badge{color:var(--dim)}
.coupon-exp{font-family:"DM Mono",monospace;font-size:12px;color:var(--text)}
.coupon-exp.urgent{color:var(--red)}
.coupon-exp.soon{color:#e0b870}
.coupon-memo{font-size:12px;color:var(--dim);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.coupon-actions{display:flex;gap:6px;margin-top:8px}
.coupon-btn{flex:1;padding:7px;background:var(--bg);border:1px solid var(--border);border-radius:7px;font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);cursor:pointer;text-align:center;text-transform:uppercase}
.coupon-btn.use{color:var(--green);border-color:rgba(122,191,160,.3)}
.shop-header{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:12px 18px 6px;border-top:1px solid var(--border);margin-top:6px}
.shop-header:first-of-type{border-top:none;margin-top:0}

/* settings */
.settings-body{padding:16px;padding-bottom:80px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:20px}
.settings-section{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px}
.settings-title{font-family:"DM Mono",monospace;font-size:11px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.settings-sub{font-size:11px;color:var(--dim);margin-bottom:10px;margin-top:-6px}
.manage-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.manage-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.manage-name{font-size:13px;color:var(--bright)}
.manage-sub{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);margin-top:2px}
.manage-actions{display:flex;gap:6px}
.manage-btn{font-family:"DM Mono",monospace;font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;text-transform:uppercase}
.manage-btn.del{color:var(--red);border-color:rgba(224,120,120,.3)}
.add-row{display:flex;gap:8px;align-items:center}
.add-row-btn{padding:11px 14px;background:var(--aglow);border:1px solid var(--accent2);border-radius:8px;color:var(--accent);font-family:"DM Mono",monospace;font-size:11px;cursor:pointer;white-space:nowrap;text-transform:uppercase}

/* form panel */
.panel{position:fixed;inset:0;background:var(--bg);z-index:30;display:none;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.panel.open{display:flex;transform:translateY(0)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.panel-title{font-family:"DM Serif Display",serif;font-size:20px;color:var(--accent)}
.panel-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:20px}
.panel-body{flex:1;overflow-y:auto;padding:18px;padding-bottom:90px}
.form-group{margin-bottom:18px}
.form-label{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--bright);font-family:"Noto Sans JP",sans-serif;font-size:15px;outline:none}
.form-input:focus{border-color:var(--accent2)}
.form-input::placeholder{color:var(--dim);font-size:13px}
.tag-grid{display:flex;flex-wrap:wrap;gap:7px}
.tag-btn{padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:var(--tagbg);color:var(--dim);font-family:"DM Mono",monospace;font-size:11px;cursor:pointer}
.tag-btn.on{background:var(--aglow);border-color:var(--accent2);color:var(--accent)}
.item-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.item-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.item-del{color:var(--dim);font-size:16px;cursor:pointer;padding:4px;margin-left:auto}
.subtotal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.subtotal-label{font-family:"DM Mono",monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
.subtotal-val{font-family:"DM Serif Display",serif;font-size:26px;color:var(--accent)}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:10px;font-size:14px;font-family:"Noto Sans JP",sans-serif;font-weight:500;cursor:pointer}
.btn-secondary{width:100%;padding:13px;background:transparent;color:var(--dim);border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:"Noto Sans JP",sans-serif;cursor:pointer;margin-top:8px}
.btn-danger{width:100%;padding:13px;background:transparent;color:var(--red);border:1px solid rgba(224,120,120,.4);border-radius:10px;font-size:13px;font-family:"Noto Sans JP",sans-serif;cursor:pointer;margin-top:8px;display:none}
.cycle-btns{display:flex;gap:8px}
.cycle-btn{flex:1;padding:10px;text-align:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:"DM Mono",monospace;font-size:11px;color:var(--dim);text-transform:uppercase}
.cycle-btn.on{background:var(--aglow);border-color:var(--accent2);color:var(--accent)}

/* toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-family:"DM Mono",monospace;font-size:11px;color:var(--bright);z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="app">

  </div>
</div>

<div id="toast" class="toast"></div>

// ── utils ──
function fmt(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtJP(s) {
  const d = new Date(s+'T00:00:00');
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function normalizeDate(s) {
  if(!s) return s;
  if(!s.includes('T')) return s;
  // UTCのISOをJST(+9h)に変換してYYYY-MM-DD取得
  const d = new Date(s);
  return fmt(new Date(d.getTime() + 9*60*60*1000));
}
function daysUntil(s) {

}
let _toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── state ──
const today = new Date();
const todayStr = fmt(today);
let records = [], coupons = [], tags = ['食費','日用品','交通費','娯楽','医療','その他'], shops = [], subs = [];
let curMonth = new Date(today.getFullYear(), today.getMonth(), 1);
let calMode = 'amount';
let curDate = null;
let curItems = [], selTags = [], nextId = 100;
let subEditIdx = null, subCycle = 'monthly', subSelTags = [];

// ── GAS ──
async function gasGet(p) {
  const r = await fetch(GAS + '?' + new URLSearchParams(p), {redirect:'follow'});
  return r.json();
}
async function gasPost(b) {
  try {
    const r = await fetch(GAS, {method:'POST', redirect:'follow', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(b)});
    return r.json();
  } catch(e) { return {error:e.message}; }
}

// ── navigation ──
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  const nav = document.getElementById('nav-'+name);
  if(nav) nav.classList.add('active');
  if(name === 'calendar') renderCalendar();
  if(name === 'coupon') renderCoupons();
  if(name === 'settings') renderSettings();
}
function openPanel(id) {
  const p = document.getElementById(id);
  p.style.display = 'flex';
  requestAnimationFrame(() => requestAnimationFrame(() => p.classList.add('open')));
}
function closePanel(id) {
  const p = document.getElementById(id);
  p.classList.remove('open');
  setTimeout(() => { p.style.display = 'none'; }, 300);
}

// ── calendar ──
function setMode(m) {
  calMode = m;
  document.getElementById('tog-amount').classList.toggle('active', m==='amount');
  document.getElementById('tog-coupon').classList.toggle('active', m==='coupon');
  renderCalendar();
}
function moveMonth(d) {
  curMonth = new Date(curMonth.getFullYear(), curMonth.getMonth()+d, 1);
  renderCalendar();
}
function renderCalendar() {
  const y = curMonth.getFullYear(), m = curMonth.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month').textContent = months[m];
  document.getElementById('cal-year').textContent = y;
  const ms = y+'-'+String(m+1).padStart(2,'0');
  const dayTotals = {};
  records.filter(r => r.date.startsWith(ms)).forEach(r => {
    const d = r.date.split('-')[2];
    const items = Array.isArray(r.items) ? r.items : (typeof r.items === 'string' ? JSON.parse(r.items) : []);
    dayTotals[d] = (dayTotals[d]||0) + items.reduce((s,i) => s+(Number(i.price)||0), 0);
  });
  const couponDays = {};
  coupons.filter(c => !c.used && c.exp && c.exp.startsWith(ms)).forEach(c => {
    couponDays[c.exp.split('-')[2]] = true;
  });
  const monthTotal = Object.values(dayTotals).reduce((s,v)=>s+v,0)
    + subs.reduce((s,sub) => s + getSubDates(sub,y,m).length * sub.amount, 0);
  document.getElementById('cal-summary').innerHTML =
    '<div class="summary-label">Monthly Total</div><div class="summary-amount">'+monthTotal.toLocaleString()+'<span>円</span></div>';
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for(let i=0;i<first;i++) { const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }
  for(let d=1;d<=days;d++) {
    const ds = String(d).padStart(2,'0');
    const dateStr = ms+'-'+ds;
    const dow = new Date(y,m,d).getDay();
    const subAmt = subs.reduce((s,sub) => getSubDates(sub,y,m).includes(dateStr) ? s+Number(sub.amount) : s, 0);
    const total = (dayTotals[ds]||0) + subAmt;
    const hasCoupon = !!couponDays[ds];
    const hasSub = subAmt > 0;
    const isToday = dateStr === todayStr;
    const cell = document.createElement('div');
    cell.className = 'cal-cell'+(isToday?' today':'')+((total>0||hasCoupon||hasSub)?' has-data':'')+(dow===0?' sun':dow===6?' sat':'');
    cell.onclick = () => openDay(dateStr);
    let html = '<div class="cal-day">'+d+'</div>';
    if(calMode==='amount' && total>0) html += '<div class="cal-amt">'+total.toLocaleString()+'</div>';
    if(calMode==='coupon') {
      if(hasCoupon) html += '<div class="dot red"></div>';
      if(hasSub) html += '<div class="dot green"></div>';
    }
    cell.innerHTML = html;
    grid.appendChild(cell);
  }
}

// ── day ──
function openDay(dateStr) {
  curDate = dateStr;
  document.getElementById('day-title').textContent = fmtJP(dateStr);
  renderDay();
  goScreen('day');
}
function renderDay() {
  const recs = records.filter(r => r.date === curDate);
  const daySubs = subs.filter(sub => {
    const [y,m] = curDate.split('-').map(Number);
    return getSubDates(sub, y, m-1).includes(curDate);
  });
  const total = recs.reduce((s,r) => s+r.items.reduce((ss,i)=>ss+i.price,0), 0)
    + daySubs.reduce((s,sub)=>s+sub.amount,0);
  let html = '<div class="day-header"><div class="day-date">'+fmtJP(curDate)+'</div><div class="day-total">'+total.toLocaleString()+' 円</div></div>';
  if(daySubs.length > 0) {
    html += '<div class="sec-label">サブスク請求</div>';
    daySubs.forEach(sub => {
      html += '<div class="trip-card"><div class="trip-head"><div class="trip-shop">'+sub.name+' <span class="sub-badge">'+(sub.cycle==='monthly'?'月次':'年次')+'</span></div><div class="trip-total">'+sub.amount.toLocaleString()+'円</div></div><div class="trip-items"><div class="trip-item">'+sub.tags.map(t=>'<span class="tag-chip">'+t+'</span>').join('')+'</div></div></div>';
    });
  }
  if(recs.length > 0) {
    html += '<div class="sec-label">買い物</div>';
    recs.forEach(r => {
      const rt = r.items.reduce((s,i)=>s+i.price,0);
      const hc = coupons.some(c => !c.used && c.shop===r.shop);
      html += '<div class="trip-card"><div class="trip-head"><div class="trip-shop">'+r.shop+'</div><div class="trip-total">'+rt.toLocaleString()+'円</div></div>';
      if(hc) html += '<div class="coupon-alert">🎫 '+r.shop+'のクーポンがあります</div>';
      html += '<div class="trip-items">'+r.items.map(item => '<div class="trip-item"><div class="trip-price">'+item.price.toLocaleString()+'円</div>'+item.tags.map(t=>'<span class="tag-chip">'+t+'</span>').join('')+'</div>').join('')+'</div></div>';
    });
  }
  if(recs.length===0 && daySubs.length===0) html += '<div class="empty-state">🛒<br>まだ記録がありません</div>';
  html += '<div class="add-btn" onclick="openShopForm()"><span style="font-size:18px;color:var(--accent)">＋</span> 買い物を追加</div>';
  document.getElementById('day-body').innerHTML = html;
}

// ── shop form ──
function openShopForm() {
  curItems = []; selTags = [];
  document.getElementById('shop-input').value = '';
  document.getElementById('price-input').value = '';
  document.getElementById('shop-coupon-alert').style.display = 'none';
  document.getElementById('shop-panel-title').textContent = fmtJP(curDate)+' の買い物';
  updateShopDatalist();
  renderShopTags();
  updateItemList();
  openPanel('shop-panel');
  document.getElementById('shop-input').oninput = function() {
    const has = this.value && coupons.some(c => !c.used && c.shop.includes(this.value));
    document.getElementById('shop-coupon-alert').style.display = has ? 'block' : 'none';
  };
}
function updateShopDatalist() {
  document.getElementById('shop-datalist').innerHTML = shops.map(s=>'<option value="'+s+'">').join('');
}
function renderShopTags() {
  document.getElementById('shop-tag-grid').innerHTML = tags.map(t =>
    '<div class="tag-btn'+(selTags.includes(t)?' on':'')+'" onclick="toggleTag(\'' + t + '\')">'+t+'</div>'
  ).join('');
}
function toggleTag(t) {
  selTags.includes(t) ? selTags.splice(selTags.indexOf(t),1) : selTags.push(t);
  renderShopTags();
}
function addItem() {
  const price = parseInt(document.getElementById('price-input').value);
  if(!price || price <= 0) { toast('金額を入力してください','err'); return; }
  curItems.push({price, tags:[...selTags]});
  document.getElementById('price-input').value = '';
  selTags = [];
  renderShopTags();
  updateItemList();
}
function removeItem(i) {
  curItems.splice(i,1);
  updateItemList();
}
function updateItemList() {
  const list = document.getElementById('shop-item-list');
  list.innerHTML = curItems.map((item,i) =>
    '<div class="item-row"><div class="trip-price">'+item.price.toLocaleString()+'円</div>'+
    item.tags.map(t=>'<span class="tag-chip">'+t+'</span>').join('')+
    '<div class="item-del" onclick="removeItem('+i+')">×</div></div>'
  ).join('');
  document.getElementById('subtotal').innerHTML = curItems.reduce((s,i)=>s+i.price,0).toLocaleString()+'<span style="font-family:DM Mono,monospace;font-size:12px;color:var(--dim)"> 円</span>';
  document.getElementById('item-count').textContent = curItems.length+'点';
}
async function saveTrip() {
  const shop = document.getElementById('shop-input').value.trim();
  if(!shop) { toast('店名を入力してください','err'); return; }
  if(curItems.length === 0) { toast('商品を追加してください','err'); return; }
  const trip = {date:curDate, shop, items:[...curItems]};
  records.push(trip);
  if(!shops.includes(shop)) { shops.push(shop); updateShopDatalist(); }
  closePanel('shop-panel');
  renderDay();
  renderCalendar();
  try {
    const res = await gasPost({action:'addRecord', ...trip});
    trip.id = res.id || nextId++;
    toast('✓ 登録しました');
  } catch(e) {
    trip.id = nextId++;
    toast('保存に失敗しました','err');
  }
}

// ── coupons ──
function renderCoupons() {
  const unlimited = coupons.filter(c => !c.used && !c.exp);
  const active = coupons.filter(c => !c.used && c.exp).sort((a,b) => a.exp.localeCompare(b.exp));
  const used = coupons.filter(c => c.used);
  const shopGroups = {};
  [...unlimited,...active,...used].forEach(c => {
    if(!shopGroups[c.shop]) shopGroups[c.shop] = [];
    shopGroups[c.shop].push(c);
  });
  let html = '';
  let first = true;
  for(const [shop, list] of Object.entries(shopGroups)) {
    html += '<div class="shop-header'+(first?' style=\"border-top:none;margin-top:0\"':'')+'">'+shop+'</div><div class="coupon-list">';
    first = false;
    list.forEach(c => {
      const unl = !c.exp;
      const days = unl ? null : daysUntil(c.exp);
      const expCls = unl ? '' : (days<=3&&!c.used?'urgent':days<=7&&!c.used?'soon':'');
      const expLabel = c.used?'使用済み':unl?'無制限':days<0?'期限切れ':days===0?'今日まで':'残'+days+'日';
      html += '<div class="coupon-card'+(c.used?' used':'')+'"><div class="coupon-top"><div class="coupon-shop">'+c.shop+'</div>'+(unl?'<div class="badge unlimited">∞ 無制限</div>':c.used?'<div class="badge used-badge">Used</div>':'')+'</div>';
      const expDisplay = unl ? '—' : normalizeDate(c.exp).replace(/-/g,'/');
      html += '<div class="coupon-exp '+expCls+'">'+expDisplay+'　<span style="font-size:10px;opacity:.8">('+expLabel+')</span></div>';
      if(c.memo) html += '<div class="coupon-memo">'+c.memo+'</div>';
      if(!c.used) html += '<div class="coupon-actions"><div class="coupon-btn use" onclick="useCoupon('+c.id+')">使用済みにする</div><div class="coupon-btn" onclick="delCoupon('+c.id+')">削除</div></div>';
      html += '</div>';
    });
    html += '</div>';
  }
  if(!coupons.length) html = '<div class="empty-state">🎫<br>クーポンがありません</div>';
  html += '<div class="add-btn" onclick="openPanel(\'coupon-panel\')"><span style="font-size:18px;color:var(--accent)">＋</span> クーポンを追加</div>';
  document.getElementById('coupon-body').innerHTML = html;
}
async function saveCoupon() {
  const shop = document.getElementById('coupon-shop').value.trim();
  if(!shop) { toast('店名を入力してください','err'); return; }
  const coupon = {id:nextId++, shop, exp:document.getElementById('coupon-exp').value, memo:document.getElementById('coupon-memo').value.trim(), used:false};
  coupons.push(coupon);
  closePanel('coupon-panel');
  renderCoupons();
  try {
    const res = await gasPost({action:'addCoupon', ...coupon});
    coupon.id = res.id || coupon.id;
    toast('✓ クーポンを登録しました');
  } catch(e) { toast('保存に失敗しました','err'); }
}
async function useCoupon(id) {
  const c = coupons.find(c=>c.id===id);
  if(c) { c.used = true; renderCoupons(); try { await gasPost({action:'updateCoupon',...c}); } catch(e){} }
}
async function delCoupon(id) {
  coupons = coupons.filter(c=>c.id!==id);
  renderCoupons();
  try { await gasPost({action:'deleteCoupon',id}); } catch(e){}
}

// ── subscriptions ──
function getSubDates(sub, y, m) {
  const ms = y+'-'+String(m+1).padStart(2,'0');
  const results = [];
  const base = new Date(sub.nextDate+'T00:00:00');
  const step = d => { if(sub.cycle==='monthly') d.setMonth(d.getMonth()+1); else d.setFullYear(d.getFullYear()+1); };
  const stepBack = d => { if(sub.cycle==='monthly') d.setMonth(d.getMonth()-1); else d.setFullYear(d.getFullYear()-1); };
  let d = new Date(base);
  for(let i=0;i<24;i++) { if(fmt(d).startsWith(ms)) results.push(fmt(d)); step(d); }
  d = new Date(base); stepBack(d);
  for(let i=0;i<24;i++) { if(fmt(d).startsWith(ms)) results.push(fmt(d)); stepBack(d); }
  return results;
}
function setCycle(c) {
  subCycle = c;
  document.getElementById('cycle-m').classList.toggle('on', c==='monthly');
  document.getElementById('cycle-y').classList.toggle('on', c==='yearly');
}
function renderSubTags() {
  document.getElementById('sub-tag-grid').innerHTML = tags.map(t =>
    '<div class="tag-btn'+(subSelTags.includes(t)?' on':'')+'" onclick="toggleSubTag(\'' + t + '\')">'+t+'</div>'
  ).join('');
}
function toggleSubTag(t) {
  subSelTags.includes(t) ? subSelTags.splice(subSelTags.indexOf(t),1) : subSelTags.push(t);
  renderSubTags();
}
function openSubForm(idx=null) {
  subEditIdx = idx; subCycle = 'monthly'; subSelTags = [];
  if(idx !== null) {
    const s = subs[idx];
    document.getElementById('sub-panel-title').textContent = 'サブスクを編集';
    document.getElementById('sub-name').value = s.name;
    document.getElementById('sub-amount').value = s.amount;
    document.getElementById('sub-next').value = s.nextDate;
    subCycle = s.cycle; subSelTags = [...s.tags];
    document.getElementById('sub-del-btn').style.display = 'block';
  } else {
    document.getElementById('sub-panel-title').textContent = 'サブスクを追加';
    document.getElementById('sub-name').value = '';
    document.getElementById('sub-amount').value = '';
    document.getElementById('sub-next').value = '';
    document.getElementById('sub-del-btn').style.display = 'none';
  }
  setCycle(subCycle); renderSubTags();
  openPanel('sub-panel');
}
async function saveSub() {
  const name = document.getElementById('sub-name').value.trim();
  const amount = parseInt(document.getElementById('sub-amount').value);
  const nextDate = document.getElementById('sub-next').value;
  if(!name) { toast('サービス名を入力してください','err'); return; }
  if(!amount||amount<=0) { toast('金額を入力してください','err'); return; }
  if(!nextDate) { toast('次回請求日を入力してください','err'); return; }
  const sub = {name, amount, cycle:subCycle, nextDate, tags:[...subSelTags]};
  if(subEditIdx !== null) {
    sub.id = subs[subEditIdx].id;
    subs[subEditIdx] = sub;
    try { await gasPost({action:'updateSub',...sub}); toast('✓ 更新しました'); } catch(e) { toast('保存に失敗しました','err'); }
  } else {
    sub.id = nextId++;
    subs.push(sub);
    try { const res = await gasPost({action:'addSub',...sub}); sub.id=res.id||sub.id; toast('✓ 登録しました'); } catch(e) { toast('保存に失敗しました','err'); }
  }
  closePanel('sub-panel');
  renderSettings();
  renderCalendar();
}
async function deleteSub() {
  if(subEditIdx===null) return;
  const id = subs[subEditIdx].id;
  subs.splice(subEditIdx,1);
  closePanel('sub-panel');
  renderSettings();
  renderCalendar();
  try { await gasPost({action:'deleteSub',id}); } catch(e){}
}

// ── settings ──
function renderSettings() {
  document.getElementById('tag-list').innerHTML = tags.map((t,i) =>
    '<div class="manage-item"><div class="manage-name">'+t+'</div><div class="manage-actions"><div class="manage-btn" onclick="renameTag('+i+')">編集</div><div class="manage-btn del" onclick="removeTag('+i+')">削除</div></div></div>'
  ).join('') || '<div style="color:var(--dim);font-size:12px">まだありません</div>';
  const allShops = [...new Set([...shops, ...records.map(r=>r.shop)])];
  shops = allShops;
  document.getElementById('shop-list').innerHTML = allShops.map((s,i) =>
    '<div class="manage-item"><div class="manage-name">'+s+'</div><div class="manage-actions"><div class="manage-btn" onclick="renameShop('+i+')">編集</div><div class="manage-btn del" onclick="removeShop('+i+')">削除</div></div></div>'
  ).join('') || '<div style="color:var(--dim);font-size:12px">まだありません</div>';
  document.getElementById('sub-list').innerHTML = subs.map((s,i) =>
    '<div class="manage-item"><div style="flex:1"><div class="manage-name">'+s.name+'</div><div class="manage-sub">'+s.amount.toLocaleString()+'円 / '+(s.cycle==='monthly'?'月次':'年次')+' — 次回 '+normalizeDate(s.nextDate).replace(/-/g,'/')+'</div></div><div class="manage-actions"><div class="manage-btn" onclick="openSubForm('+i+')">編集</div></div></div>'
  ).join('') || '<div style="color:var(--dim);font-size:12px">まだありません</div>';
}
function addTag() {
  const v = document.getElementById('new-tag').value.trim();
  if(!v || tags.includes(v)) { toast('タグ名を確認してください','err'); return; }
  tags.push(v); document.getElementById('new-tag').value = '';
  renderSettings();
  try { gasPost({action:'saveTags',tags}); } catch(e){}
}
function removeTag(i) { tags.splice(i,1); renderSettings(); try { gasPost({action:'saveTags',tags}); } catch(e){} }
function renameTag(i) {
  const v = prompt('新しいタグ名', tags[i]);
  if(!v||!v.trim()) return;
  records.forEach(r => r.items.forEach(item => { const idx=item.tags.indexOf(tags[i]); if(idx!==-1) item.tags[idx]=v.trim(); }));
  tags[i] = v.trim(); renderSettings();
  try { gasPost({action:'saveTags',tags}); } catch(e){}
}
function addShop() {
  const v = document.getElementById('new-shop').value.trim();
  if(!v || shops.includes(v)) { toast('お店名を確認してください','err'); return; }
  shops.push(v); document.getElementById('new-shop').value = '';
  renderSettings(); updateShopDatalist();
}
function removeShop(i) { shops.splice(i,1); renderSettings(); updateShopDatalist(); }
function renameShop(i) {
  const v = prompt('新しいお店名', shops[i]);
  if(!v||!v.trim()) return;
  records.forEach(r => { if(r.shop===shops[i]) r.shop=v.trim(); });
  coupons.forEach(c => { if(c.shop===shops[i]) c.shop=v.trim(); });
  shops[i] = v.trim(); renderSettings(); updateShopDatalist();
}

// ── init ──
goScreen('calendar');
async function loadData() {
  // ローディング表示
  document.getElementById('cal-summary').innerHTML =
    '<div class="summary-label">読み込み中...</div><div class="summary-amount" style="font-size:16px;opacity:.5">しばらくお待ちください</div>';
  try {
    const data = await Promise.race([
      gasGet({action:'getAll'}),
      new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')),12000))
    ]);
    if(data.records) records = data.records;
    if(data.coupons) {
      // exp の日付を正規化
      coupons = data.coupons.map(c => ({...c, exp: normalizeDate(c.exp)}));
    }
    if(data.tags&&data.tags.length) tags = data.tags;
    if(data.shops) shops = data.shops;
    if(data.subs) {
      // nextDate を正規化
      subs = data.subs.map(s => ({...s, nextDate: normalizeDate(s.nextDate)}));
    }
    renderCalendar();
    renderCoupons();
    renderSettings();
  } catch(e) {
    toast('読み込みエラー: ' + e.message, 'err');
    renderCalendar(); // エラーでもカレンダーは表示
  }
}
loadData();
